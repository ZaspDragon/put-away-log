<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Put Away Log</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Put Away Log</h1>
        <p class="sub">Track put aways by worker, date, item, quantity, location, and notes.</p>
      </div>

      <div id="sessionBox" class="session-box hidden">
        <span id="sessionEmail"></span>
        <span id="sessionRole" class="badge"></span>
        <button id="signOutBtn" type="button">Logout</button>
      </div>
    </header>

    <section id="loginCard" class="card">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="form-grid two-up">
          <div>
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Email" required />
          </div>

          <div>
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Password" required />
          </div>
        </div>

        <div class="actions">
          <button type="submit">Login</button>
        </div>

        <p id="loginMsg" class="msg"></p>
      </form>
    </section>

    <main id="appView" class="hidden">
      <section class="card">
        <h2>Put Away Entry</h2>

        <form id="putAwayForm">
          <div class="form-grid two-up">
            <div>
              <label for="workerName">Worker Name</label>
              <select id="workerName" required>
                <option value="">Select worker</option>
              </select>
            </div>

            <div>
              <label for="workDate">Date</label>
              <input id="workDate" type="date" required />
            </div>
          </div>

          <div class="stats-row">
            <div class="stat-box">
              <span class="stat-label">Used Lines</span>
              <strong id="usedLines">0</strong>
            </div>
            <div class="stat-box">
              <span class="stat-label">Total Qty</span>
              <strong id="totalQty">0</strong>
            </div>
          </div>

          <div class="table-wrap">
            <table class="entry-table">
              <thead>
                <tr>
                  <th>Line</th>
                  <th>Item #</th>
                  <th>Qty</th>
                  <th>Location</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody id="lineItemsBody"></tbody>
            </table>
          </div>

          <div class="actions">
            <button type="submit">Submit Put Away</button>
            <button id="clearBtn" type="button" class="secondary">Clear Form</button>
          </div>

          <p id="formMsg" class="msg"></p>
        </form>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Recent Logs</h2>
          <div class="toolbar">
            <input id="searchInput" type="text" placeholder="Search worker, item, location, notes..." />
            <input id="filterDate" type="date" />
            <button id="exportBtn" type="button" class="secondary">Export CSV</button>
          </div>
        </div>

        <div class="table-wrap">
          <table class="log-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Worker</th>
                <th>Lines</th>
                <th>Total Qty</th>
                <th>Preview</th>
              </tr>
            </thead>
            <tbody id="logsTableBody">
              <tr>
                <td colspan="5" class="empty">No logs yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section id="adminSection" class="card hidden">
        <h2>Admin / Lead Worker Management</h2>

        <form id="employeeForm">
          <div class="form-grid two-up">
            <div>
              <label for="employeeName">Add Worker Name</label>
              <input id="employeeName" type="text" placeholder="Worker name" required />
            </div>

            <div class="align-end">
              <button type="submit">Add Worker</button>
            </div>
          </div>

          <p id="employeeMsg" class="msg"></p>
        </form>

        <div class="employee-list-wrap">
          <h3>Active Workers</h3>
          <div id="employeeList" class="employee-list">
            <div class="empty">No active workers yet.</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
