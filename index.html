<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Put Away Log</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app-shell">

    <!-- HEADER -->
    <header class="topbar">
      <div>
        <h1>Put Away Log</h1>
        <p class="sub">Track item number, quantity, location, and notes</p>
      </div>

      <div id="sessionBox" class="session-box hidden">
        <span id="sessionEmail"></span>
        <span id="sessionRole" class="badge"></span>
        <button id="logoutBtn">Logout</button>
      </div>
    </header>

    <!-- LOGIN -->
    <div id="loginBox" class="card">
      <h2>Login</h2>
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button id="loginBtn">Login</button>
    </div>

    <!-- MAIN APP -->
    <div id="appContent" class="hidden">

      <!-- FORM -->
      <div class="card">
        <h2>Put Away Entry</h2>

        <label>Name</label>
        <select id="employeeName"></select>

        <label>Date</label>
        <input type="date" id="date" />

        <table>
          <thead>
            <tr>
              <th>Item #</th>
              <th>Qty</th>
              <th>Location</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- 8 rows -->
            <script>
              for (let i = 0; i < 8; i++) {
                document.write(`
                  <tr>
                    <td><input class="item" /></td>
                    <td><input class="qty" type="number" /></td>
                    <td><input class="location" /></td>
                    <td><input class="notes" /></td>
                  </tr>
                `);
              }
            </script>
          </tbody>
        </table>

        <button id="submitBtn">Submit Put Away</button>
      </div>

      <!-- LOG TABLE -->
      <div class="card">
        <h2>Recent Logs</h2>
        <table id="logTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Date</th>
              <th>Item</th>
              <th>Qty</th>
              <th>Location</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

    </div>

  </div>

  <!-- ✅ FIREBASE (MUST BE BEFORE app.js) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    window.firebaseModules = {
      initializeApp,
      getAuth,
      getFirestore
    };
  </script>

  <!-- YOUR APP LOGIC -->
  <script src="app.js"></script>

</body>
</html>
